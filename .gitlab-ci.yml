default:
  tags:
    - docker

stages:
  - compliance
  - format
  - lint
  - type_check
  - test
  - coverage
  - audit
  - build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip
    - frontend/citizen-app/node_modules/
    - frontend/admin-dashboard/node_modules/

include:
  - local: '.gitlab/ci/lint.yml'
  - local: '.gitlab/ci/test.yml'
  - local: '.gitlab/ci/security.yml'

compliance:check:
  image: python:3.12-slim
  stage: compliance
  script:
    - python scripts/compliance_checker.py || echo "Compliance checker missing"

pre-commit:check:
  image: python:3.12-slim
  stage: compliance
  before_script:
    - pip install pre-commit
  script:
    - pre-commit run --all-files

python:format:
  image: python:3.12-slim
  stage: format
  before_script:
    - pip install ruff
  script:
    - ruff format --check .
    - ruff check .

python:type_check:
  image: python:3.12-slim
  stage: type_check
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r backend/requirements.txt -r ai-service/requirements.txt -r requirements-dev.txt
  script:
    - mypy --config-file mypy.ini backend ai-service scripts || echo "Mypy config missing"

python:coverage:
  image: python:3.12-slim
  stage: coverage
  needs: ["python:test"]
  script:
    - pip install coverage
    - coverage report
    - coverage xml
  artifacts:
    paths:
      - coverage.xml

gitleaks:check:
  image: 
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  stage: audit
  script:
    - gitleaks detect --source . -v

changelog:check:
  image: rust:latest
  stage: audit
  before_script:
    - cargo install git-cliff
  script:
    - git-cliff --version
    - git-cliff -o CHANGELOG.md
  artifacts:
    paths:
      - CHANGELOG.md
