stages:
  - lint
  - test
  - audit
  - build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip
    - frontend/citizen-app/node_modules/
    - frontend/admin-dashboard/node_modules/

python:lint:
  image: python:3.12-slim
  stage: lint
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements-dev.txt
  script:
    - flake8 backend ai-service scripts
    - pylint backend ai-service scripts
    - bandit -c .bandit -r backend ai-service
    - vulture backend ai-service scripts --min-confidence 80

python:test:
  image: python:3.12-slim
  stage: test
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r backend/requirements.txt -r ai-service/requirements.txt -r requirements-dev.txt
  script:
    - pytest --cov=backend --cov=ai-service --cov-report=term-missing --cov-report=xml
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml

security:audit:
  image: python:3.12-slim
  stage: audit
  before_script:
    - python -m pip install --upgrade pip
    - pip install pip-audit
  script:
    - pip-audit -r backend/requirements.txt -r ai-service/requirements.txt

frontend:build:
  image: node:22-alpine
  stage: build
  script:
    - cd frontend/citizen-app && npm ci && npm run build
    - cd ../admin-dashboard && npm ci && npm run build

