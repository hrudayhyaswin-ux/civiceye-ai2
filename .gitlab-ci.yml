stages:
  - compliance
  - format
  - lint
  - type_check
  - test
  - coverage
  - audit
  - build

compliance:check:
  image: python:3.12-slim
  stage: compliance
  script:
    - python scripts/compliance_checker.py

pre-commit:check:
  image: python:3.12-slim
  stage: compliance
  before_script:
    - pip install pre-commit
  script:
    - pre-commit run --all-files

python:format:
  image: python:3.12-slim
  stage: format
  before_script:
    - pip install ruff
  script:
    - ruff format --check .
    - ruff check .

python:lint:
  image: python:3.12-slim
  stage: lint
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements-dev.txt semgrep pyupgrade
  script:
    - flake8 backend ai-service scripts
    - pylint backend ai-service scripts
    - bandit -c .bandit -r backend ai-service
    - vulture backend ai-service scripts --min-confidence 80
    - semgrep scan --config auto
    - find backend ai-service -name "*.py" | xargs pyupgrade --py311-plus

python:type_check:
  image: python:3.12-slim
  stage: type_check
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r backend/requirements.txt -r ai-service/requirements.txt -r requirements-dev.txt
  script:
    - mypy --config-file mypy.ini backend ai-service scripts

python:test:
  image: python:3.12-slim
  stage: test
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r backend/requirements.txt -r ai-service/requirements.txt -r requirements-dev.txt
  script:
    - pytest --cov=backend --cov=ai-service --cov-report=term-missing --cov-report=xml --cov-fail-under=60
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml

python:coverage:
  image: python:3.12-slim
  stage: coverage
  needs: ["python:test"]
  script:
    - pip install coverage
    - coverage report
    - coverage xml
  artifacts:
    paths:
      - coverage.xml

security:audit:
  image: python:3.12-slim
  stage: audit
  before_script:
    - python -m pip install --upgrade pip
    - pip install pip-audit trufflehog
  script:
    - pip-audit -r backend/requirements.txt -r ai-service/requirements.txt
    - trufflehog filesystem . --no-update

gitleaks:check:
  image: 
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  stage: audit
  script:
    - gitleaks detect --source . -v

changelog:check:
  image: rust:latest
  stage: audit
  before_script:
    - cargo install git-cliff
  script:
    - git-cliff --version
    - git-cliff -o CHANGELOG.md
  artifacts:
    paths:
      - CHANGELOG.md

frontend:build:
  image: node:22-alpine
  stage: build
  script:
    - cd frontend/citizen-app && npm ci && npm run build
    - cd ../admin-dashboard && npm ci && npm run build
