security:audit:
  image: python:3.12-slim
  stage: audit
  before_script:
    - python -m pip install --upgrade pip
    - pip install pip-audit trufflehog
  script:
    - pip-audit -r backend/requirements.txt -r ai-service/requirements.txt
    - trufflehog filesystem . --no-update

frontend:audit:
  image: node:22-alpine
  stage: audit
  script:
    - cd frontend/citizen-app && npm audit || echo "Audit found vulnerabilities"
    - cd ../admin-dashboard && npm audit || echo "Audit found vulnerabilities"
