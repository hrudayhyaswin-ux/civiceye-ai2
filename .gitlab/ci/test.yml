python:test:
  image: python:3.12-slim
  stage: test
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r backend/requirements.txt -r ai-service/requirements.txt -r requirements-dev.txt
  script:
    - pytest --cov=backend --cov=ai-service --cov-report=term-missing --cov-report=xml --cov-fail-under=60
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml

frontend:build:
  image: node:22-alpine
  stage: build
  script:
    - cd frontend/citizen-app && npm ci && npm run build
    - cd ../admin-dashboard && npm ci && npm run build
