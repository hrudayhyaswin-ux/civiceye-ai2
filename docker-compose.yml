services:
  backend:
    build: ./backend
    ports:
      - "5001:5001"
    environment:
      - DATABASE_URL=sqlite:///civiceye.db
      - AI_SERVICE_URL=http://ai-service:8001
    volumes:
      - ./backend:/app
    depends_on:
      - ai-service

  ai-service:
    build: ./ai-service
    ports:
      - "8001:8001"
    volumes:
      - ./ai-service:/app

